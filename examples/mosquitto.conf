# Mosquitto configuration with Dynamic Security Plugin
# Place this in /mosquitto/config/mosquitto.conf

# ========== Basic Settings ==========
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwordfile

# ========== Dynamic Security Plugin ==========
# El plugin viene incluido en eclipse-mosquitto:2
# Ubicación del plugin en la imagen Docker
# Dynamic Security plugin (no incluido en la imagen base)
# plugin /mosquitto/lib/mosquitto-dynamic-security.so
# plugin_opt_config_file /mosquitto/config/dynamic-security.json
# Si necesita Dynamic Security, agregue el .so al build o apunte a la ruta correcta

# ========== Persistence ==========
persistence true
persistence_location /mosquitto/data/

# ========== Logging ==========
log_type error
log_type warning
log_type notice
log_type information
log_dest file /mosquitto/log/mosquitto.log
# Also send logs to stdout so `docker logs` shows them
log_dest stdout

# Optional: WebSocket support (for ws/wss protocols)
# listener 8080
# protocol websockets
